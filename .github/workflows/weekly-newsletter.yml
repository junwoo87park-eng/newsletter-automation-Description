name: Weekly Newsletter Automation

# 매주 월요일 오전 9시(KST) 자동 실행
on:
  schedule:
    - cron: '0 0 * * 1'  # UTC 월요일 00:00 = KST 월요일 09:00
  workflow_dispatch:  # 수동 실행 버튼도 활성화

jobs:
  generate-newsletter:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v3
      
      - name: 🐍 Python 설정
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: 📦 패키지 설치
        run: |
          pip install -r requirements.txt
      
      - name: 1️⃣ 뉴스 크롤링
        run: |
          echo "🔍 뉴스 수집 시작..."
          python scripts/crawler.py
          echo "✅ 크롤링 완료"
      
      - name: 2️⃣ 뉴스레터 생성
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          echo "🤖 Claude로 뉴스레터 생성 중..."
          python scripts/generator.py
          echo "✅ 생성 완료"
      
      - name: 📤 생성된 파일 업로드
        uses: actions/upload-artifact@v3
        with:
          name: newsletter-${{ github.run_number }}
          path: |
            crawled_data.json
            newsletter_*.html
          retention-days: 30
      
      - name: 🎉 완료 알림
        run: |
          echo "======================================"
          echo "✅ 뉴스레터 자동 생성 완료!"
          echo "======================================"
          echo "📁 Actions 탭 → Artifacts에서 다운로드 가능"
          echo "======================================"
