name: Newsletter Crawler

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install packages
        run: |
          pip install beautifulsoup4 requests lxml feedparser
      
      - name: Crawl news
        run: python scripts/crawler.py
      
      - uses: actions/upload-artifact@v4
        with:
          name: news-data
          path: crawled_data.json
