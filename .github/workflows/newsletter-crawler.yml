name: Newsletter Crawler

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 1'

jobs:
  crawl:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install beautifulsoup4 requests lxml feedparser
      
      - name: Run crawler
        run: |
          python scripts/crawler.py
          ls -la
          cat crawled_data.json || echo "File not created"
      
      - name: Upload results
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: crawled-news
          path: crawled_data.json
          if-no-files-found: error
